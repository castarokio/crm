<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Top face gradient: light source from top-left -->
    <linearGradient id="topFace" x1="20" y1="8" x2="44" y2="24" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60C8FF"/>
      <stop offset="50%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
    <!-- Left face gradient: darker, side lighting -->
    <linearGradient id="leftFace" x1="8" y1="24" x2="32" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1E40AF"/>
      <stop offset="100%" stop-color="#0C1A40"/>
    </linearGradient>
    <!-- Right face gradient: medium shadow -->
    <linearGradient id="rightFace" x1="32" y1="24" x2="56" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1D4ED8"/>
      <stop offset="100%" stop-color="#0F1F4A"/>
    </linearGradient>
    <!-- Glossy sheen on top -->
    <linearGradient id="gloss" x1="20" y1="8" x2="44" y2="22" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Drop shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#0369A1" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Drop shadow base -->
  <ellipse cx="32" cy="60" rx="18" ry="3" fill="#0284C7" opacity="0.25"/>

  <!-- TOP face (isometric top) -->
  <polygon points="32,6  52,18  32,30  12,18" fill="url(#topFace)" filter="url(#shadow)"/>

  <!-- LEFT face -->
  <polygon points="12,18  32,30  32,54  12,42" fill="url(#leftFace)"/>

  <!-- RIGHT face -->
  <polygon points="52,18  32,30  32,54  52,42" fill="url(#rightFace)"/>

  <!-- Glossy sheen overlay on top face -->
  <polygon points="32,6  52,18  32,30  12,18" fill="url(#gloss)"/>

  <!-- Edge highlights (rim light) -->
  <line x1="12" y1="18" x2="32" y2="6"  stroke="#7DD3FC" stroke-width="0.8" opacity="0.9"/>
  <line x1="32" y1="6"  x2="52" y2="18" stroke="#7DD3FC" stroke-width="0.8" opacity="0.9"/>
  <line x1="12" y1="18" x2="12" y2="42" stroke="#3B82F6" stroke-width="0.6" opacity="0.6"/>
  <line x1="52" y1="18" x2="52" y2="42" stroke="#1D4ED8" stroke-width="0.6" opacity="0.5"/>
  <line x1="12" y1="42" x2="32" y2="54" stroke="#1E40AF" stroke-width="0.6" opacity="0.5"/>
  <line x1="52" y1="42" x2="32" y2="54" stroke="#1E3A8A" stroke-width="0.6" opacity="0.4"/>

  <!-- "OS" text on front-left face, slightly angled -->
  <text
    x="22" y="46"
    font-family="Arial Black, Arial, sans-serif"
    font-size="11"
    font-weight="900"
    fill="white"
    opacity="0.92"
    letter-spacing="0.5"
    filter="url(#glow)"
  >OS</text>
</svg>
